name: CI
on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
env:
  COCOTB_IGNORE_PYTHON_REQUIRES: "1"

jobs:
  core:
    name: core
    runs-on: [self-hosted, ci-runner]
    container: &fpga_toolchain_container
      image: ghcr.io/zubax/zubax-fpga-toolchain-oss:latest
      options: --user root
    steps:
      - &checkout_step
        uses: actions/checkout@v7
      - &python_cache_step
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
      - run: nox -s tests typecheck black

  cosim_examples:
    name: cosim_examples
    runs-on: [self-hosted, ci-runner]
    container: *fpga_toolchain_container
    steps:
      - *checkout_step
      - *python_cache_step
      - run: nox -s cosim_examples

  fuzz:
    name: fuzz
    runs-on: ubuntu-latest
    container: *fpga_toolchain_container
    steps:
      - *checkout_step
      - *python_cache_step
      - run: nox -s fuzz

  synth:
    name: synth
    runs-on: [self-hosted, ci-runner]
    container: &mega_toolchain_container
      image: containers.zubax.com/zubax-fpga-toolchain-mega:latest
      options: --user root --cap-add NET_ADMIN --shm-size 8g --volume /run/udev:/run/udev:ro
    steps:
      - *checkout_step
      - *python_cache_step
      - run: nox -s synth
      - if: always()
        uses: actions/upload-artifact@v7
        with: { name: synth-artifacts, path: build, if-no-files-found: ignore }

  synth_examples:
    name: synth_examples
    runs-on: [self-hosted, ci-runner]
    container: *mega_toolchain_container
    steps:
      - *checkout_step
      - *python_cache_step
      - run: nox -s synth_examples
      - if: always()
        uses: actions/upload-artifact@v7
        with: { name: synth_examples-artifacts, path: build, if-no-files-found: ignore }
