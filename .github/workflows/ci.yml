name: CI
on:
  push:
env:
  COCOTB_IGNORE_PYTHON_REQUIRES: "1"

jobs:
  core:
    name: core
    runs-on: ubuntu-latest
    container: &fpga_toolchain_container
      image: ghcr.io/zubax/zubax-fpga-toolchain:latest
      options: --user root
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Run nox core checks
        run: nox -s tests typecheck black

  cosim_examples:
    name: cosim_examples
    runs-on: ubuntu-latest
    container: *fpga_toolchain_container
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Run nox cosim_examples
        run: nox -s cosim_examples

  synth:
    name: synth
    runs-on: ubuntu-latest
    container: *fpga_toolchain_container
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Run nox synth
        run: nox -s synth

  synth_examples:
    name: synth_examples
    runs-on: ubuntu-latest
    container: *fpga_toolchain_container
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Run nox synth_examples
        run: nox -s synth_examples
